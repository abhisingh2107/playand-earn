<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Play & Earn - BGMI Tournament Platform</title>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Segoe UI', sans-serif; }
    body { background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%); color: #fff; min-height: 100vh; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    
    /* Navbar */
    .navbar { background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); padding: 15px 25px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; border-bottom: 3px solid #ff6600; }
    .logo { font-size: 28px; font-weight: bold; background: linear-gradient(135deg, #ff8c00, #ff2e00); -webkit-background-clip: text; background-clip: text; color: transparent; }
    
    /* Buttons */
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
    .btn-primary { background: #ff6600; color: white; }
    .btn-primary:hover { background: #ff5500; transform: scale(1.05); }
    .btn-danger { background: #dc3545; color: white; }
    .btn-success { background: #28a745; color: white; }
    .btn-warning { background: #ffc107; color: black; }
    .btn-info { background: #17a2b8; color: white; }
    .btn-secondary { background: #6c757d; color: white; }
    
    /* Cards */
    .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border-radius: 15px; padding: 25px; margin-bottom: 25px; border: 1px solid rgba(255,102,0,0.3); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: rgba(0,0,0,0.5); border-radius: 15px; padding: 20px; text-align: center; transition: transform 0.3s; }
    .stat-card:hover { transform: translateY(-5px); }
    .stat-value { font-size: 48px; font-weight: bold; color: #ff8c42; margin: 10px 0; }
    
    /* Forms */
    input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.5); border: 1px solid #ff6600; border-radius: 8px; color: white; font-size: 14px; }
    input:focus, select:focus { outline: none; border-color: #ff3300; box-shadow: 0 0 10px rgba(255,102,0,0.3); }
    
    /* Tournament Cards */
    .tournament-card { background: rgba(0,0,0,0.6); border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 5px solid #ff6600; transition: all 0.3s; }
    .tournament-card:hover { transform: translateX(5px); background: rgba(0,0,0,0.8); }
    .tournament-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 15px; }
    .tournament-type { background: #ff6600; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .tournament-status { padding: 5px 12px; border-radius: 20px; font-size: 12px; }
    .status-live { background: #28a745; }
    .status-upcoming { background: #ffc107; color: #000; }
    .status-completed { background: #6c757d; }
    .tournament-details { display: flex; flex-wrap: wrap; gap: 20px; margin: 15px 0; }
    .detail-item { background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 8px; }
    
    /* User Row */
    .user-row { background: rgba(0,0,0,0.5); border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    
    /* Alert */
    .alert { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 10px; z-index: 10000; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    /* Admin Panel */
    .admin-panel { border: 2px solid #ff6600; background: rgba(0,0,0,0.7); }
    .admin-panel h2, .admin-panel h3 { color: #ff6600; margin-bottom: 15px; }
    
    /* Loading */
    .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; display: none; }
    .spinner { width: 60px; height: 60px; border: 5px solid #ff6600; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Tables */
    .history-table { width: 100%; border-collapse: collapse; }
    .history-table th, .history-table td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .history-table th { background: rgba(255,102,0,0.3); }
    
    /* Responsive */
    @media (max-width: 768px) { .container { padding: 10px; } .stats-grid { grid-template-columns: 1fr; } .tournament-details { flex-direction: column; gap: 10px; } .navbar { flex-direction: column; text-align: center; } }
    
    /* Levels */
    .level-badge { background: linear-gradient(135deg, #ffd700, #ff8c00); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; color: #000; }
    .leaderboard-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .rank-1 { background: rgba(255,215,0,0.2); }
    .rank-2 { background: rgba(192,192,192,0.2); }
    .rank-3 { background: rgba(205,127,50,0.2); }
  </style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <p style="margin-top: 20px;" id="loadingText">Loading...</p>
</div>

<div id="app"></div>

<script>
// ========== FIREBASE CONFIG - YAHAN APNA CONFIG DALO ==========
const firebaseConfig = {
  apiKey: "AIzaSyCLTcuTmPPLkymMOWA_2ESKLqXGo3fzN-Q",
    authDomain: "https://play-and-earn-430a6.firebaseapp.com",
    projectId: "play-and-earn-430a6",
    storageBucket: "https://play-and-earn-430a6.firebasestorage.app",
    messagingSenderId: "813858943938",
    appId: "1:813858943938:web:a30fb4ac85fe4363bf9c5b"
};
// ============================================================

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let currentUserData = null;
let tournamentsUnsubscribe = null;
let leaderboardUnsubscribe = null;

function showLoading(show, text = "Loading...") {
  const loadingDiv = document.getElementById('loading');
  const loadingText = document.getElementById('loadingText');
  if (show) {
    loadingText.innerText = text;
    loadingDiv.style.display = 'flex';
  } else {
    loadingDiv.style.display = 'none';
  }
}

function showAlert(message, type) {
  const alertDiv = document.createElement('div');
  alertDiv.className = 'alert';
  alertDiv.style.background = type === 'success' ? '#28a745' : '#dc3545';
  alertDiv.innerHTML = message;
  document.body.appendChild(alertDiv);
  setTimeout(() => alertDiv.remove(), 3000);
}

function getLevel(points) {
  if (points >= 10000) return { name: 'Diamond', color: '#00bfff', icon: '💎' };
  if (points >= 5000) return { name: 'Platinum', color: '#e5e4e2', icon: '⭐' };
  if (points >= 2000) return { name: 'Gold', color: '#ffd700', icon: '🥇' };
  if (points >= 1000) return { name: 'Silver', color: '#c0c0c0', icon: '🥈' };
  if (points >= 500) return { name: 'Bronze', color: '#cd7f32', icon: '🥉' };
  return { name: 'Iron', color: '#8c8c8c', icon: '⚙️' };
}

// Login/Register Page
function showAuthPage() {
  document.getElementById('app').innerHTML = `
    <div class="container">
      <div class="card" style="max-width: 500px; margin: 50px auto;">
        <h2 style="text-align: center;"><i class="fas fa-gamepad"></i> Play & Earn</h2>
        <p style="text-align: center; margin-bottom: 30px;">BGMI Tournament Platform</p>
        
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
          <button id="loginTabBtn" class="btn btn-primary" style="flex:1">Login</button>
          <button id="registerTabBtn" class="btn" style="flex:1; background:#333">Register</button>
        </div>
        
        <div id="loginDiv">
          <input type="email" id="loginEmail" placeholder="Email">
          <input type="password" id="loginPassword" placeholder="Password">
          <button id="doLoginBtn" class="btn btn-primary" style="width:100%">Login</button>
          <button id="forgotPasswordBtn" class="btn btn-secondary" style="width:100%; margin-top:10px;">Forgot Password?</button>
        </div>
        
        <div id="registerDiv" style="display:none">
          <input type="email" id="regEmail" placeholder="Email">
          <input type="password" id="regPassword" placeholder="Password (min 6 chars)">
          <input type="text" id="regUsername" placeholder="Username">
          <input type="text" id="refCode" placeholder="Referral Code (optional)">
          <button id="doRegisterBtn" class="btn btn-primary" style="width:100%">Register</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('loginTabBtn').onclick = () => {
    document.getElementById('loginDiv').style.display = 'block';
    document.getElementById('registerDiv').style.display = 'none';
  };
  document.getElementById('registerTabBtn').onclick = () => {
    document.getElementById('loginDiv').style.display = 'none';
    document.getElementById('registerDiv').style.display = 'block';
  };

  document.getElementById('doLoginBtn').onclick = async () => {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { showAlert('Fill all fields', 'error'); return; }
    showLoading(true, "Logging in...");
    try {
      await auth.signInWithEmailAndPassword(email, password);
      showAlert('Login successful!', 'success');
    } catch(error) { showAlert(error.message, 'error'); showLoading(false); }
  };

  document.getElementById('forgotPasswordBtn').onclick = async () => {
    const email = document.getElementById('loginEmail').value;
    if (!email) { showAlert('Enter your email first', 'error'); return; }
    showLoading(true, "Sending reset email...");
    try {
      await auth.sendPasswordResetEmail(email);
      showAlert('Password reset email sent!', 'success');
    } catch(error) { showAlert(error.message, 'error'); }
    finally { showLoading(false); }
  };

  document.getElementById('doRegisterBtn').onclick = async () => {
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    const username = document.getElementById('regUsername').value;
    const refCode = document.getElementById('refCode').value;
    
    if (!email || !password || !username) { showAlert('Fill all fields', 'error'); return; }
    if (password.length < 6) { showAlert('Password min 6 chars', 'error'); return; }
    
    showLoading(true, "Creating account...");
    try {
      const result = await auth.createUserWithEmailAndPassword(email, password);
      const uid = result.user.uid;
      
      await db.collection('users').doc(uid).set({
        email: email,
        username: username,
        points: 100,
        isAdmin: false,
        referralId: uid.substring(0, 8).toUpperCase(),
        referredBy: refCode || null,
        dailyLogin: null,
        adCount: 0,
        adDate: null,
        banned: false,
        totalMatches: 0,
        wins: 0,
        createdAt: new Date()
      });
      
      if (refCode) {
        const refQuery = await db.collection('users').where('referralId', '==', refCode).get();
        if (!refQuery.empty) {
          await db.collection('users').doc(refQuery.docs[0].id).update({
            points: firebase.firestore.FieldValue.increment(50)
          });
          await db.collection('users').doc(uid).update({
            points: firebase.firestore.FieldValue.increment(50)
          });
          showAlert('Referral bonus applied! +50 points', 'success');
        }
      }
      
      showAlert('Registration successful! Please login.', 'success');
      await auth.signOut();
      document.getElementById('loginTabBtn').click();
      showLoading(false);
    } catch(error) { showAlert(error.message, 'error'); showLoading(false); }
  };
}

// Dashboard
async function showDashboard() {
  showLoading(true, "Loading dashboard...");
  
  try {
    const uid = currentUser.uid;
    const userDoc = await db.collection('users').doc(uid).get();
    
    if (!userDoc.exists) { await auth.signOut(); return; }
    currentUserData = userDoc.data();
    if (currentUserData.banned) { showAlert('Account banned!', 'error'); await auth.signOut(); return; }
    
    const isAdmin = currentUserData.isAdmin === true;
    const level = getLevel(currentUserData.points);
    
    // Real-time tournaments listener
    if (tournamentsUnsubscribe) tournamentsUnsubscribe();
    tournamentsUnsubscribe = db.collection('tournaments').orderBy('createdAt', 'desc').onSnapshot(async (snapshot) => {
      await renderTournaments(snapshot, uid, currentUserData.points, isAdmin);
    });
    
    // Real-time leaderboard
    if (leaderboardUnsubscribe) leaderboardUnsubscribe();
    leaderboardUnsubscribe = db.collection('users').orderBy('points', 'desc').limit(10).onSnapshot((snapshot) => {
      renderLeaderboard(snapshot);
    });
    
    // Get match history
    const matchHistory = await db.collection('matchHistory').where('userId', '==', uid).orderBy('joinedAt', 'desc').get();
    let historyHtml = '';
    matchHistory.forEach(doc => {
      const h = doc.data();
      historyHtml += `
        <tr>
          <td>${h.tournamentType || 'TDM'}</td>
          <td>${h.mode || 'Solo'}</td>
          <td>${h.result || 'Joined'}</td>
          <td>${new Date(h.joinedAt?.toDate()).toLocaleString() || 'Recent'}</td>
        </tr>
      `;
    });
    
    // Get withdrawals
    const withdrawals = await db.collection('withdrawRequests').where('userId', '==', uid).orderBy('createdAt', 'desc').get();
    let withdrawHtml = '';
    withdrawals.forEach(doc => {
      const w = doc.data();
      withdrawHtml += `<div style="background:#333; padding:10px; margin:5px 0;">${w.amount} pts - ${w.status} - ${w.upiId}</div>`;
    });
    
    // Admin Panel
    let adminHtml = '';
    if (isAdmin) {
      const users = await db.collection('users').get();
      let usersHtml = '';
      users.forEach(doc => {
        const u = doc.data();
        usersHtml += `
          <div class="user-row">
            <div><strong>${u.username || u.email}</strong><br>💰 ${u.points} pts | ${u.isAdmin ? '👑 Admin' : '👤 User'} | ${u.banned ? '🚫 Banned' : '✅ Active'}</div>
            <div>
              <button class="addPointsAdmin btn btn-success" data-id="${doc.id}">+100</button>
              <button class="makeAdminBtn btn btn-warning" data-id="${doc.id}">Make Admin</button>
              <button class="banUserBtn btn btn-danger" data-id="${doc.id}" data-banned="${u.banned}">${u.banned ? 'Unban' : 'Ban'}</button>
            </div>
          </div>
        `;
      });
      
      adminHtml = `
        <div class="card admin-panel">
          <h2><i class="fas fa-crown"></i> ADMIN PANEL</h2>
          
          <h3>Create Tournament</h3>
          <select id="tournamentTypeSelect">
            <option value="TDM">TDM Match</option>
            <option value="Classic">Classic Match (Erangle)</option>
          </select>
          <select id="tournamentModeSelect">
            <option value="1v1">1v1</option>
            <option value="2v2">2v2</option>
            <option value="4v4">4v4</option>
            <option value="Solo">Solo</option>
            <option value="Duo">Duo</option>
            <option value="Squad">Squad</option>
          </select>
          <input type="text" id="newRoomId" placeholder="Room ID">
          <input type="text" id="newPassword" placeholder="Password">
          <input type="number" id="newEntryFee" placeholder="Entry Fee (points)">
          <input type="datetime-local" id="newTournamentTime" placeholder="Tournament Time">
          <select id="newStatusSelect">
            <option value="Live">Live</option>
            <option value="Upcoming">Upcoming</option>
            <option value="Completed">Completed</option>
          </select>
          <button id="createTournamentBtn" class="btn btn-primary">Create Tournament</button>
          
          <h3 style="margin-top:20px;">Withdrawal Requests</h3>
          <div id="pendingWithdrawals"></div>
        </div>
      `;
    }
    
    document.getElementById('app').innerHTML = `
      <div class="container">
        <div class="navbar">
          <div class="logo"><i class="fas fa-trophy"></i> PLAY & EARN ARENA</div>
          <div>
            <span class="level-badge"><i class="fas fa-level-up-alt"></i> ${level.name} ${level.icon}</span>
            <span style="margin-left:15px;"><i class="fas fa-coins"></i> ${currentUserData.points} pts (₹${(currentUserData.points/10).toFixed(2)})</span>
            ${isAdmin ? '<span style="background:#ff6600; padding:5px 15px; border-radius:20px; margin-left:10px;">👑 ADMIN</span>' : ''}
            <button id="logoutBtn" class="btn btn-danger" style="margin-left:10px;">Logout</button>
          </div>
        </div>
        
        <div class="stats-grid">
          <div class="stat-card"><i class="fas fa-coins fa-2x"></i><div class="stat-value">${currentUserData.points}</div><div>Points</div></div>
          <div class="stat-card"><i class="fas fa-rupee-sign fa-2x"></i><div class="stat-value">₹${(currentUserData.points/10).toFixed(2)}</div><div>Earnings</div></div>
          <div class="stat-card"><i class="fas fa-trophy fa-2x"></i><div class="stat-value">${currentUserData.wins || 0}</div><div>Wins</div></div>
          <div class="stat-card"><i class="fas fa-users fa-2x"></i><div class="stat-value">${currentUserData.totalMatches || 0}</div><div>Matches</div></div>
        </div>
        
        <div class="card">
          <h3><i class="fas fa-gamepad"></i> Live Tournaments</h3>
          <div id="tournamentsList">Loading tournaments...</div>
        </div>
        
        <div class="stats-grid">
          <div class="card">
            <h3><i class="fas fa-star"></i> Reward Zone</h3>

            <button id="dailyBonusBtn" class="btn btn-success" style="width:100%; margin-bottom:10px;"><i class="fas fa-calendar"></i> Daily Bonus (+20)</button>
            <button id="spinWheelBtn" class="btn btn-warning" style="width:100%; margin-bottom:10px;"><i class="fas fa-sync-alt"></i> Spin Wheel (50 pts)</button>
            <p><i class="fas fa-gift"></i> Referral Code: <strong>${currentUserData.referralId}</strong> → 50 pts each</p>
          </div>
          
          <div class="card">
            <h3><i class="fas fa-chart-line"></i> Leaderboard (Top 10)</h3>
            <div id="leaderboardList">Loading...</div>
          </div>
        </div>
        
        <div class="card">
          <h3><i class="fas fa-history"></i> Match History</h3>
          <table class="history-table">
            <thead><tr><th>Type</th><th>Mode</th><th>Result</th><th>Date</th></tr></thead>
            <tbody>${historyHtml || '<tr><td colspan="4">No matches played yet</td></tr>'}</tbody>
          </table>
        </div>
        
        <div class="card">
          <h3><i class="fas fa-money-bill-wave"></i> Withdraw</h3>
          <p>Min 500 points (₹50) | 100 pts = ₹10</p>
          <input type="number" id="withdrawAmount" placeholder="Points (min 500)">
          <input type="text" id="upiId" placeholder="UPI ID / PayTM">
          <button id="withdrawBtn" class="btn btn-primary">Request Withdrawal</button>
          <div style="margin-top:15px;"><h4>History</h4>${withdrawHtml || '<p>No requests</p>'}</div>
        </div>
        
        ${adminHtml}
      </div>
    `;
    
    // Event listeners
    document.getElementById('logoutBtn').onclick = async () => { await auth.signOut(); location.reload(); };
    document.getElementById('watchAdBtn').onclick = async () => await watchAd(uid, currentUserData);
    document.getElementById('dailyBonusBtn').onclick = async () => await dailyBonus(uid, currentUserData);
    document.getElementById('spinWheelBtn').onclick = async () => await spinWheel(uid, currentUserData);
    document.getElementById('withdrawBtn').onclick = async () => await requestWithdraw(uid, currentUserData);
    
    if (isAdmin) {
      document.getElementById('createTournamentBtn').onclick = async () => await createTournament();
      await loadPendingWithdrawals();
    }
    
    showLoading(false);
  } catch(error) {
    console.error("Dashboard error:", error);
    showAlert("Error loading dashboard: " + error.message, 'error');
    showLoading(false);
  }
}

async function renderTournaments(snapshot, uid, userPoints, isAdmin) {
  const container = document.getElementById('tournamentsList');
  if (!container) return;
  
  if (snapshot.empty) {
    container.innerHTML = '<p>No tournaments available. Admin can create below.</p>';
    return;
  }
  
  let html = '';
  snapshot.forEach(doc => {
    const t = doc.data();
    const statusClass = t.status === 'Live' ? 'status-live' : (t.status === 'Upcoming' ? 'status-upcoming' : 'status-completed');
    const tournamentTime = t.tournamentTime ? new Date(t.tournamentTime).toLocaleString() : 'TBD';
    
    html += `
      <div class="tournament-card" data-id="${doc.id}">
        <div class="tournament-header">
          <span class="tournament-type">${t.tournamentType || 'TDM'} - ${t.mode || 'Solo'}</span>
          <span class="tournament-status ${statusClass}">${t.status || 'Live'}</span>
        </div>
        <div class="tournament-details">
          <div class="detail-item"><i class="fas fa-door-open"></i> Room: ${t.roomId}</div>
          <div class="detail-item"><i class="fas fa-lock"></i> Pass: ${t.password}</div>
          <div class="detail-item"><i class="fas fa-ticket-alt"></i> Fee: ${t.entryFee} pts</div>
          <div class="detail-item"><i class="fas fa-calendar"></i> Time: ${tournamentTime}</div>
        </div>
        ${t.status === 'Live' ? `<button class="joinTournamentBtn btn btn-primary" data-id="${doc.id}" data-fee="${t.entryFee}" data-type="${t.tournamentType}" data-mode="${t.mode}">Join Tournament</button>` : 
          `<button class="btn btn-secondary" disabled>${t.status === 'Upcoming' ? 'Coming Soon' : 'Completed'}</button>`}
        ${isAdmin ? `<button class="deleteTournamentBtn btn btn-danger" data-id="${doc.id}" style="margin-left:10px;">Delete</button>` : ''}
      </div>
    `;
  });
  
  container.innerHTML = html;
  
  // Join tournament buttons
  document.querySelectorAll('.joinTournamentBtn').forEach(btn => {
    btn.onclick = async () => {
      const tournamentId = btn.dataset.id;
      const fee = parseInt(btn.dataset.fee);
      const tournamentType = btn.dataset.type;
      const mode = btn.dataset.mode;
      
      if (userPoints < fee) { showAlert('Insufficient points!', 'error'); return; }
      
      showLoading(true, "Joining tournament...");
      try {
        await db.runTransaction(async (transaction) => {
          const userRef = db.collection('users').doc(uid);
          const userSnap = await transaction.get(userRef);
          if (userSnap.data().points < fee) throw new Error('Insufficient points');
          transaction.update(userRef, { 
            points: userSnap.data().points - fee,
            totalMatches: firebase.firestore.FieldValue.increment(1)
          });
          
          // Add to match history
          const matchRef = db.collection('matchHistory').doc();
          transaction.set(matchRef, {
            userId: uid,
            tournamentId: tournamentId,
            tournamentType: tournamentType,
            mode: mode,
            result: 'Joined',
            joinedAt: new Date()
          });
        });
        
        // Get tournament details for email notification (simulate)
        const tournamentDoc = await db.collection('tournaments').doc(tournamentId).get();
        const tournament = tournamentDoc.data();
        showAlert(`Joined! Room: ${tournament.roomId}, Password: ${tournament.password}`, 'success');
        
        // Simulate sending email to admin
        console.log(`User ${currentUser.email} joined tournament ${tournament.roomId}`);
        
        setTimeout(() => showDashboard(), 1500);
      } catch(error) { showAlert(error.message, 'error'); showLoading(false); }
    };
  });
  
  // Delete tournament (admin)
  if (isAdmin) {
    document.querySelectorAll('.deleteTournamentBtn').forEach(btn => {
      btn.onclick = async () => {
        if (confirm('Delete this tournament?')) {
          showLoading(true, "Deleting...");
          try {
            await db.collection('tournaments').doc(btn.dataset.id).delete();
            showAlert('Tournament deleted', 'success');
          } catch(error) { showAlert(error.message, 'error'); }
          finally { showLoading(false); }
        }
      };
    });
  }
}

function renderLeaderboard(snapshot) {
  const container = document.getElementById('leaderboardList');
  if (!container) return;
  
  let rank = 1;
  let html = '';
  snapshot.forEach(doc => {
    const u = doc.data();
    const rankClass = rank === 1 ? 'rank-1' : (rank === 2 ? 'rank-2' : (rank === 3 ? 'rank-3' : ''));
    html += `<div class="leaderboard-item ${rankClass}">
      <span><strong>#${rank}</strong> ${u.username || u.email}</span>
      <span><i class="fas fa-coins"></i> ${u.points} pts</span>
    </div>`;
    rank++;
  });
  container.innerHTML = html || '<p>No users yet</p>';
}

async function watchAd(uid, userData) {
  const today = new Date().toDateString();
  if (userData.adDate === today && userData.adCount >= 5) {
    showAlert('Daily ad limit reached (max 5 ads)!', 'error');
    return;
  }
  const reward = Math.floor(Math.random() * 6) + 5;
  const newCount = userData.adDate === today ? userData.adCount + 1 : 1;
  showLoading(true, "Playing ad...");
  try {
    await db.collection('users').doc(uid).update({
      points: firebase.firestore.FieldValue.increment(reward),
      adCount: newCount,
      adDate: today
    });
    showAlert(`You earned ${reward} points!`, 'success');
    setTimeout(() => showDashboard(), 1000);
  } catch(error) { showAlert(error.message, 'error'); showLoading(false); }
}

async function dailyBonus(uid, userData) {
  const today = new Date().toDateString();
  if (userData.dailyLogin === today) {
    showAlert('Already claimed today!', 'error');
    return;
  }
  showLoading(true, "Claiming bonus...");
  try {
    await db.collection('users').doc(uid).update({
      points: firebase.firestore.FieldValue.increment(20),
      dailyLogin: today
    });
    showAlert('+20 points claimed!', 'success');
    setTimeout(() => showDashboard(), 1000);
  } catch(error) { showAlert(error.message, 'error'); showLoading(false); }
}

async function spinWheel(uid, userData) {
  if (userData.points < 50) {
    showAlert('Need 50 points to spin!', 'error');
    return;
  }
  const prizes = [10, 20, 50, 100, 200, 500];
  const prize = prizes[Math.floor(Math.random() * prizes.length)];
  showLoading(true, "Spinning wheel...");
  try {
    await db.runTransaction(async (transaction) => {
      const userRef = db.collection('users').doc(uid);
      const userSnap = await transaction.get(userRef);
      if (userSnap.data().points < 50) throw new Error('Insufficient points');
      transaction.update(userRef, { points: userSnap.data().points - 50 + prize });
    });
    showAlert(`🎉 You won ${prize} points!`, 'success');
    setTimeout(() => showDashboard(), 1000);
  } catch(error) { showAlert(error.message, 'error'); showLoading(false); }
}

async function requestWithdraw(uid, userData) {
  const amount = parseInt(document.getElementById('withdrawAmount').value);
  const upi = document.getElementById('upiId').value;
  
  if (!amount || amount < 500) { showAlert('Minimum 500 points', 'error'); return; }
  if (!upi) { showAlert('Enter UPI ID', 'error'); return; }
  if (amount > userData.points) { showAlert('Insufficient points!', 'error'); return; }
  
  showLoading(true, "Submitting request...");
  try {
    await db.runTransaction(async (transaction) => {
      const userRef = db.collection('users').doc(uid);
      const userSnap = await transaction.get(userRef);
      if (userSnap.data().points < amount) throw new Error('Insufficient');
      transaction.update(userRef, { points: userSnap.data().points - amount });
      transaction.set(db.collection('withdrawRequests').doc(), {
        userId: uid,
        amount: amount,
        upiId: upi,
        status: 'pending',
        createdAt: new Date()
      });
    });
    showAlert('Withdrawal request submitted!', 'success');
    setTimeout(() => showDashboard(), 1500);
  } catch(error) { showAlert(error.message, 'error'); showLoading(false); }
}

async function createTournament() {
  const tournamentType = document.getElementById('tournamentTypeSelect').value;
  const mode = document.getElementById('tournamentModeSelect').value;
  const roomId = document.getElementById('newRoomId').value;
  const password = document.getElementById('newPassword').value;
  const entryFee = parseInt(document.getElementById('newEntryFee').value);
  const tournamentTime = document.getElementById('newTournamentTime').value;
  const status = document.getElementById('newStatusSelect').value;
  
  if (!roomId || !password || !entryFee) {
    showAlert('Please fill all fields', 'error');
    return;
  }
  
  showLoading(true, "Creating tournament...");
  try {
    await db.collection('tournaments').add({
      tournamentType: tournamentType,
      mode: mode,
      roomId: roomId,
      password: password,
      entryFee: entryFee,
      tournamentTime: tournamentTime ? new Date(tournamentTime) : null,
      status: status,
      createdAt: new Date(),
      participants: []
    });
    showAlert('Tournament created!', 'success');
    document.getElementById('newRoomId').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('newEntryFee').value = '';
  } catch(error) { showAlert(error.message, 'error'); }
  finally { showLoading(false); }
}

async function loadPendingWithdrawals() {
  const pending = await db.collection('withdrawRequests').where('status', '==', 'pending').get();
  const container = document.getElementById('pendingWithdrawals');
  if (!container) return;
  
  if (pending.empty) {
    container.innerHTML = '<p>No pending requests</p>';
    return;
  }
  
  let html = '';
  pending.forEach(doc => {
    const w = doc.data();
    html += `
      <div class="user-row">
        <div>User: ${w.userId}<br>💰 ${w.amount} pts (₹${(w.amount/10).toFixed(2)})<br>UPI: ${w.upiId}</div>
        <div>
          <button class="approveWithdrawBtn btn btn-success" data-id="${doc.id}">Approve</button>
          <button class="rejectWithdrawBtn btn btn-danger" data-id="${doc.id}" data-user="${w.userId}" data-amount="${w.amount}">Reject</button>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
  
  document.querySelectorAll('.approveWithdrawBtn').forEach(btn => {
    btn.onclick = async () => {
      showLoading(true, "Approving...");
      try {
        await db.collection('withdrawRequests').doc(btn.dataset.id).update({ status: 'approved' });
        showAlert('Withdrawal approved!', 'success');
        setTimeout(() => loadPendingWithdrawals(), 1000);
      } catch(error) { showAlert(error.message, 'error'); }
      finally { showLoading(false); }
    };
  });
  
  document.querySelectorAll('.rejectWithdrawBtn').forEach(btn => {
    btn.onclick = async () => {
      const userId = btn.dataset.user;
      const amount = parseInt(btn.dataset.amount);
      showLoading(true, "Rejecting...");
      try {
        await db.runTransaction(async (transaction) => {
          const userRef = db.collection('users').doc(userId);
          const userSnap = await transaction.get(userRef);
          transaction.update(userRef, { points: (userSnap.data().points || 0) + amount });
          transaction.update(db.collection('withdrawRequests').doc(btn.dataset.id), { status: 'rejected' });
        });
        showAlert('Withdrawal rejected, points refunded!', 'success');
        setTimeout(() => loadPendingWithdrawals(), 1000);
      } catch(error) { showAlert(error.message, 'error'); }
      finally { showLoading(false); }
    };
  });
  
  // Admin user management buttons
  document.querySelectorAll('.addPointsAdmin').forEach(btn => {
    btn.onclick = async () => {
      showLoading(true, "Adding points...");
      try {
        await db.collection('users').doc(btn.dataset.id).update({ points: firebase.firestore.FieldValue.increment(100) });
        showAlert('Added 100 points!', 'success');
        setTimeout(() => showDashboard(), 1000);
      } catch(error) { showAlert(error.message, 'error'); }
      finally { showLoading(false); }
    };
  });
  
  document.querySelectorAll('.makeAdminBtn').forEach(btn => {
    btn.onclick = async () => {
      showLoading(true, "Making admin...");
      try {
        await db.collection('users').doc(btn.dataset.id).update({ isAdmin: true });
        showAlert('User is now admin!', 'success');
        setTimeout(() => showDashboard(), 1000);
      } catch(error) { showAlert(error.message, 'error'); }
      finally { showLoading(false); }
    };
  });
  
  document.querySelectorAll('.banUserBtn').forEach(btn => {
    btn.onclick = async () => {
      const currentlyBanned = btn.dataset.banned === 'true';
      showLoading(true, "Updating user...");
      try {
        await db.collection('users').doc(btn.dataset.id).update({ banned: !currentlyBanned });
        showAlert(`User ${!currentlyBanned ? 'banned' : 'unbanned'}`, 'success');
        setTimeout(() => showDashboard(), 1000);
      } catch(error) { showAlert(error.message, 'error'); }
      finally { showLoading(false); }
    };
  });
}

// Auth State Listener
auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;
    await showDashboard();
  } else {
    if (tournamentsUnsubscribe) tournamentsUnsubscribe();
    if (leaderboardUnsubscribe) leaderboardUnsubscribe();
    showAuthPage();
    showLoading(false);
  }
});
</script>
